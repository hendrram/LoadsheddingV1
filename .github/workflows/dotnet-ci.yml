name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore
        run: dotnet restore LoadsheddingV1.sln

      - name: Build
        run: dotnet build LoadsheddingV1.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LoadsheddingV1.sln --configuration Release --no-build --verbosity normal
